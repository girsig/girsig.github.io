<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ana & Stefan Girsig</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Floating blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: float 12s ease-in-out infinite;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: #7b2ff7; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 350px; height: 350px; background: #00d4ff; bottom: -80px; right: -80px; animation-delay: -4s; }
    .blob-3 { width: 250px; height: 250px; background: #ff6bcb; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    .blob-3 {
      animation-name: float3;
    }
    @keyframes float3 {
      0%, 100% { transform: translate(-50%,-50%) scale(1); }
      50% { transform: translate(-50%, calc(-50% - 20px)) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 52px 60px;
      max-width: 460px;
      width: 90%;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.2);
      color: #fff;
      text-align: center;
      animation: fadeIn 0.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      margin: 0 auto 24px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.25);
      box-shadow: 0 4px 24px rgba(123,47,247,0.5);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 20%;
      transform: scale(1.4);
      transform-origin: 42% 18%;
    }

    .names {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #fff 0%, #c9b8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .location {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 28px;
    }

    .greeting {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: rgba(255,255,255,0.85);
      font-size: 0.92rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .link-item:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
      color: #fff;
    }

    .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(123,47,247,0.7), rgba(0,212,255,0.7));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon svg {
      width: 15px;
      height: 15px;
      fill: #fff;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <div class="avatar"><img src="CE98E1C0-461E-4DE4-A532-D2197CC8B52F_4_5005_c.jpeg" alt="Ana & Stefan Girsig" /></div>
    <div class="names">Ana &amp; Stefan Girsig</div>
    <div class="location">
      <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
      </svg>
      Heidelberg, Germany
    </div>

    <hr class="divider" />

    <p class="greeting">Hallo Leute! — Drop us a line,<br>we look forward to hearing from you!</p>

    <div class="links">
      <a class="link-item" href="mailto:stefan@girsig.de">
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
        </div>
        stefan@girsig.de
      </a>

      <a class="link-item" href="mailto:stefan.gi@web.de">
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
        </div>
        stefan.gi@web.de
      </a>

      <a class="link-item" href="https://www.girsig.de" target="_blank" rel="noopener">
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </div>
        www.girsig.de
      </a>
    </div>

    <div class="footer">girsig.github.io</div>
  </div>
</body>
</html>
